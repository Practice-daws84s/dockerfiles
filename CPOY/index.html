<!DOCTYPE html>
<html>
<head>
<title>My Product Store</title>
<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    text-align:center;
}

.container{
    background:white;
    width:300px;
    margin:100px auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

img{
    width:200px;
}

button{
    background:#28a745;
    color:white;
    border:none;
    padding:10px 20px;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}
</style>

<script>
function buyProduct(){
    alert("Thank you for buying this product! 🎉");
}
</script>

</head>

<body>

<h1>My Online Store 🛍️</h1>

<div class="container">
    <img src="https://via.placeholder.com/200" alt="Product">
    <h2>Wireless Headphones</h2>
    <p>Price: $49</p>
    <button onclick="buyProduct()">Buy Now</button>
</div>

</body>
</html>
